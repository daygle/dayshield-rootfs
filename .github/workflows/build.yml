name: Build RootFS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout dayshield-rootfs
        uses: actions/checkout@v5
        with:
          path: rootfs

      - name: Checkout dayshield-ui
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-ui
          ref: main
          path: dayshield-ui-src

      - name: Checkout dayshield-core
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-core
          ref: 9c68406804a018ce3fefae8c60cc189b3c32048c  # main as of 2026-05-07
          path: dayshield-core-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dayshield-ui-src/package-lock.json

      - name: Build dayshield-ui dist
        working-directory: dayshield-ui-src
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master as of 2026-05-07
        with:
          toolchain: "1.88.0"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            dayshield-core-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('dayshield-core-src/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build dayshield-core binary
        working-directory: dayshield-core-src
        run: cargo build --release -p dayshield-core

      - name: Copy binary to rootfs workspace
        run: cp dayshield-core-src/target/release/dayshield-core rootfs/dayshield-core

      - name: Install rootfs build dependencies
        run: |
          # Bootstrap current Debian archive keys without depending on the
          # runner already trusting Debian apt metadata.
          curl -fsSL \
            -o /tmp/debian-archive-keyring_2025.1_all.deb \
            https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2025.1_all.deb
          sudo dpkg -i /tmp/debian-archive-keyring_2025.1_all.deb
          rm -f /tmp/debian-archive-keyring_2025.1_all.deb

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mmdebstrap zstd debian-archive-keyring

      - name: Build rootfs
        working-directory: rootfs
        run: |
          sudo make rootfs \
            UI_DIR="${GITHUB_WORKSPACE}/dayshield-ui-src/dist" \
            CORE_REPO_DIR="${GITHUB_WORKSPACE}/dayshield-core-src" \
            UI_REPO_DIR="${GITHUB_WORKSPACE}/dayshield-ui-src" \
            ROOTFS_REPO_DIR="${GITHUB_WORKSPACE}/rootfs"

      - name: Verify rootfs artifacts
        working-directory: rootfs
        run: |
          VERIFY_DIR="$(mktemp -d)"
          sudo tar -C "${VERIFY_DIR}" -xf rootfs.tar.zst

          FAIL=0

          echo "==> Checking /usr/local/sbin/dayshield-core"
          if sudo test -x "${VERIFY_DIR}/usr/local/sbin/dayshield-core"; then
            echo "  [PASS] dayshield-core is present and executable"
          else
            echo "  [FAIL] dayshield-core missing or not executable" >&2
            FAIL=1
          fi

          sudo rm -rf "${VERIFY_DIR}"

          if [ "${FAIL}" -ne 0 ]; then
            exit 1
          fi

      - name: Upload rootfs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dayshield-rootfs
          path: rootfs/rootfs.tar.zst
          retention-days: 7
