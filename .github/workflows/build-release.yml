name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        type: string
      core_ref:
        description: 'Override dayshield-core Tag (Optional)'
        required: false
        type: string
      ui_ref:
        description: 'Override dayshield-ui Tag (Optional)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # Resolve rootfs release tag
      # ─────────────────────────────────────────────────────────────────────────
      - name: Resolve release tag and artifact name
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          printf 'tag=%s\n' "${TAG}" >> "${GITHUB_OUTPUT}"
          printf 'artifact=rootfs-%s.tar.zst\n' "${TAG}" >> "${GITHUB_OUTPUT}"
          printf 'artifact_image=rootfs-%s.squashfs\n' "${TAG}" >> "${GITHUB_OUTPUT}"
          printf 'artifact_manifest=rootfs-%s-manifest.json\n' "${TAG}" >> "${GITHUB_OUTPUT}"

      # ─────────────────────────────────────────────────────────────────────────
      # Auto-detect latest tags for core and ui
      # ─────────────────────────────────────────────────────────────────────────
      - name: Resolve latest core/ui tags
        id: tags
        run: |
          set -euo pipefail

          CORE_TAG=$(git ls-remote --tags https://github.com/daygle/dayshield-core.git \
            | awk -F/ '{print $3}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          UI_TAG=$(git ls-remote --tags https://github.com/daygle/dayshield-ui.git \
            | awk -F/ '{print $3}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          if [ -z "${CORE_TAG}" ]; then
            echo "ERROR: could not resolve latest dayshield-core tag" >&2
            exit 1
          fi
          if [ -z "${UI_TAG}" ]; then
            echo "ERROR: could not resolve latest dayshield-ui tag" >&2
            exit 1
          fi

          echo "core_tag=${CORE_TAG}" >> $GITHUB_OUTPUT
          echo "ui_tag=${UI_TAG}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────────────────
      # Checkout sources
      # ─────────────────────────────────────────────────────────────────────────
      - name: Checkout dayshield-rootfs
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.version.outputs.tag }}
          path: rootfs

      # ─────────────────────────────────────────────────────────────────────────
      # Fetch UI artifact from dayshield-ui release
      # ─────────────────────────────────────────────────────────────────────────
      - name: Download dayshield-ui release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          UI_REF="${{ inputs.ui_ref || steps.tags.outputs.ui_tag }}"
          ASSET="ui-${UI_REF}.tar.zst"
          ASSET_SHA256="${ASSET}.sha256"
          UI_WORK_DIR="${GITHUB_WORKSPACE}/ui-artifact"

          rm -rf "${UI_WORK_DIR}"
          mkdir -p "${UI_WORK_DIR}"

          gh release download "${UI_REF}" \
            --repo daygle/dayshield-ui \
            --pattern "${ASSET}" \
            --pattern "${ASSET_SHA256}" \
            --dir "${UI_WORK_DIR}"

          if [ ! -f "${UI_WORK_DIR}/${ASSET_SHA256}" ]; then
            echo "ERROR: missing checksum file ${ASSET_SHA256} for UI release ${UI_REF}" >&2
            exit 1
          fi

          (cd "${UI_WORK_DIR}" && sha256sum -c "${ASSET_SHA256}")

          tar --zstd -xf "${UI_WORK_DIR}/${ASSET}" -C "${UI_WORK_DIR}"

      # ─────────────────────────────────────────────────────────────────────────
      # Fetch core binary from dayshield-core release
      # ─────────────────────────────────────────────────────────────────────────
      - name: Download dayshield-core release binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CORE_REF="${{ inputs.core_ref || steps.tags.outputs.core_tag }}"
          ASSET="core-${CORE_REF}.tar.zst"
          WORK_DIR="$(mktemp -d)"

          gh release download "${CORE_REF}" \
            --repo daygle/dayshield-core \
            --pattern "${ASSET}" \
            --pattern "${ASSET}.sha256" \
            --pattern "checksums.txt" \
            --dir "${WORK_DIR}"

          if [ -f "${WORK_DIR}/${ASSET}.sha256" ]; then
            (cd "${WORK_DIR}" && sha256sum -c "${ASSET}.sha256")
          elif [ -f "${WORK_DIR}/checksums.txt" ]; then
            CHECKSUM_LINE_COUNT="$(awk -v file="${ASSET}" '$2 == file {count++} END {print count+0}' "${WORK_DIR}/checksums.txt")"
            if [ "${CHECKSUM_LINE_COUNT}" -ne 1 ]; then
              echo "ERROR: expected exactly one checksum entry for ${ASSET} in checksums.txt" >&2
              exit 1
            fi
            (cd "${WORK_DIR}" && awk -v file="${ASSET}" '$2 == file {print $1 "  " $2}' checksums.txt > core.sha256 && sha256sum -c core.sha256)
          else
            echo "ERROR: missing checksum file for core release ${CORE_REF}" >&2
            exit 1
          fi

          tar --zstd -xf "${WORK_DIR}/${ASSET}" -C "${WORK_DIR}"
          install -m 0755 "${WORK_DIR}/dayshield-core" rootfs/dayshield-core

      # ─────────────────────────────────────────────────────────────────────────
      # Build rootfs
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install rootfs build dependencies
        run: |
          curl -fsSL \
            -o /tmp/debian-archive-keyring_2025.1_all.deb \
            https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2025.1_all.deb
          sudo dpkg -i /tmp/debian-archive-keyring_2025.1_all.deb
          rm -f /tmp/debian-archive-keyring_2025.1_all.deb

          sudo apt-get update -qq
          # mksquashfs is provided by the squashfs-tools package and is required
          # by scripts/build-rootfs.sh for the immutable rootfs image artifact.
          sudo apt-get install -y --no-install-recommends mmdebstrap zstd squashfs-tools debian-archive-keyring

      - name: Build rootfs
        working-directory: rootfs
        run: |
          ENABLE_SUITE_UPDATES=1

          sudo make rootfs \
            OUTPUT="${{ steps.version.outputs.artifact }}" \
            ROOTFS_IMAGE_OUTPUT="${{ steps.version.outputs.artifact_image }}" \
            ROOTFS_MANIFEST_OUTPUT="${{ steps.version.outputs.artifact_manifest }}" \
            ENABLE_SUITE_UPDATES="${ENABLE_SUITE_UPDATES}" \
            UI_DIR="${GITHUB_WORKSPACE}/ui-artifact/dist" \
            ROOTFS_REPO_DIR="${GITHUB_WORKSPACE}/rootfs"

      # ─────────────────────────────────────────────────────────────────────────
      # Verify
      # ─────────────────────────────────────────────────────────────────────────
      - name: Verify rootfs artifact
        working-directory: rootfs
        run: |
          VERIFY_DIR="$(mktemp -d)"
          sudo tar -I zstd -C "${VERIFY_DIR}" -xf "${{ steps.version.outputs.artifact }}"

          FAIL=0

          echo "==> Checking /usr/local/sbin/dayshield-core"
          if sudo test -x "${VERIFY_DIR}/usr/local/sbin/dayshield-core"; then
            echo "  [PASS] dayshield-core is present and executable"
          else
            echo "  [FAIL] dayshield-core missing or not executable" >&2
            FAIL=1
          fi

          echo "==> Checking /usr/local/share/dayshield-ui/index.html"
          if sudo test -f "${VERIFY_DIR}/usr/local/share/dayshield-ui/index.html"; then
            echo "  [PASS] dayshield-ui index.html is present"
          else
            echo "  [FAIL] dayshield-ui index.html missing" >&2
            FAIL=1
          fi

          echo "==> Checking immutable rootfs image artifact"
          IMAGE_ARTIFACT="${{ steps.version.outputs.artifact_image }}"
          if [ -f "${IMAGE_ARTIFACT}" ]; then
            echo "  [PASS] rootfs image artifact exists: ${IMAGE_ARTIFACT}"
            unsquashfs -s "${IMAGE_ARTIFACT}" >/dev/null
            echo "  [PASS] squashfs image metadata is readable"
          else
            echo "  [FAIL] rootfs image artifact missing: ${IMAGE_ARTIFACT}" >&2
            FAIL=1
          fi

          echo "==> Checking rootfs release manifest"
          MANIFEST_ARTIFACT="${{ steps.version.outputs.artifact_manifest }}"
          if [ -f "${MANIFEST_ARTIFACT}" ]; then
            echo "  [PASS] rootfs manifest exists: ${MANIFEST_ARTIFACT}"
            python3 - "${MANIFEST_ARTIFACT}" <<'PY'
            import json
            import sys
            path = sys.argv[1]
            with open(path, 'r', encoding='utf-8') as fh:
                data = json.load(fh)
            assert data.get("component") == "rootfs", (
                f"Expected component 'rootfs', got {data.get('component')!r}"
            )
            strategy = data.get("update_strategy", {})
            assert strategy.get("type") == "initramfs-image", (
                f"Expected update strategy 'initramfs-image', got {strategy.get('type')!r}"
            )
            image = data.get("artifacts", {}).get("image", {})
            assert image.get("format") == "squashfs", (
                f"Expected image format 'squashfs', got {image.get('format')!r}"
            )
            PY
            echo "  [PASS] rootfs manifest schema validated"
          else
            echo "  [FAIL] rootfs manifest missing: ${MANIFEST_ARTIFACT}" >&2
            FAIL=1
          fi

          sudo rm -rf "${VERIFY_DIR}"

          if [ "${FAIL}" -ne 0 ]; then
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Checksum
      # ─────────────────────────────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        working-directory: rootfs
        run: |
          sha256sum "${{ steps.version.outputs.artifact }}" \
            > "${{ steps.version.outputs.artifact }}.sha256"
          sha256sum "${{ steps.version.outputs.artifact_image }}" \
            > "${{ steps.version.outputs.artifact_image }}.sha256"
          sha256sum "${{ steps.version.outputs.artifact_manifest }}" \
            > "${{ steps.version.outputs.artifact_manifest }}.sha256"

      # ─────────────────────────────────────────────────────────────────────────
      # Publish GitHub Release
      # ─────────────────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        working-directory: rootfs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARTIFACT="${{ steps.version.outputs.artifact }}"
          ARTIFACT_IMAGE="${{ steps.version.outputs.artifact_image }}"
          ARTIFACT_MANIFEST="${{ steps.version.outputs.artifact_manifest }}"
          CORE_REF="${{ inputs.core_ref || steps.tags.outputs.core_tag }}"
          UI_REF="${{ inputs.ui_ref || steps.tags.outputs.ui_tag }}"

          NOTES=$(cat <<EOF
          ## DayShield RootFS ${TAG}

          Deterministic Debian-based root filesystem for the DayShield Firewall appliance.

          ### Artifacts
          - \`${ARTIFACT}\`
          - \`${ARTIFACT}.sha256\`
          - \`${ARTIFACT_IMAGE}\`
          - \`${ARTIFACT_IMAGE}.sha256\`
          - \`${ARTIFACT_MANIFEST}\`
          - \`${ARTIFACT_MANIFEST}.sha256\`

          ### Build inputs
          - **dayshield-core tag:** \`${CORE_REF}\`
          - **dayshield-ui tag:** \`${UI_REF}\`

          ### Independent versioning
          RootFS versioning is independent of core and UI.

          ### Integration
          Download the manifest to discover the GitHub-hosted archive and squashfs
          image for a given rootfs version. Updaters should compare the running
          \`/etc/dayshield/version\` value with the manifest's \`version\`, then
          stage the squashfs image for initramfs-driven deployment.

          Use the archive artifact when building the ISO:
          \`\`\`sh
          make -C ../dayshield-iso iso ROOTFS=/path/to/${ARTIFACT}
          \`\`\`
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "rootfs ${TAG}" \
              --notes "${NOTES}"
            gh release upload "${TAG}" \
              "${ARTIFACT}" \
              "${ARTIFACT}.sha256" \
              "${ARTIFACT_IMAGE}" \
              "${ARTIFACT_IMAGE}.sha256" \
              "${ARTIFACT_MANIFEST}" \
              "${ARTIFACT_MANIFEST}.sha256" \
              --clobber
          else
            gh release create "${TAG}" \
              --title "rootfs ${TAG}" \
              --notes "${NOTES}" \
              "${ARTIFACT}" \
              "${ARTIFACT}.sha256" \
              "${ARTIFACT_IMAGE}" \
              "${ARTIFACT_IMAGE}.sha256" \
              "${ARTIFACT_MANIFEST}" \
              "${ARTIFACT_MANIFEST}.sha256"
          fi