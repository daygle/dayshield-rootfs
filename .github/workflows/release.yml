name: Release RootFS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing repository tag to release (e.g. v1.2.3)'
        required: true
        type: string
      core_ref:
        description: 'Override dayshield-core tag (optional)'
        required: false
        type: string
      ui_ref:
        description: 'Override dayshield-ui tag (optional)'
        required: false
        type: string
      enable_suite_updates:
        description: 'Include SUITE-updates in this build (default: false)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # Resolve rootfs release tag
      # ─────────────────────────────────────────────────────────────────────────
      - name: Resolve release tag and artifact name
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          printf 'tag=%s\n' "${TAG}" >> "${GITHUB_OUTPUT}"
          printf 'artifact=rootfs-%s.tar.zst\n' "${TAG}" >> "${GITHUB_OUTPUT}"

      # ─────────────────────────────────────────────────────────────────────────
      # Auto-detect latest tags for core and ui
      # ─────────────────────────────────────────────────────────────────────────
      - name: Resolve latest core/ui tags
        id: tags
        run: |
          CORE_TAG=$(git ls-remote --tags https://github.com/daygle/dayshield-core.git \
            | awk -F/ '{print $3}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          UI_TAG=$(git ls-remote --tags https://github.com/daygle/dayshield-ui.git \
            | awk -F/ '{print $3}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          echo "core_tag=${CORE_TAG}" >> $GITHUB_OUTPUT
          echo "ui_tag=${UI_TAG}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────────────────
      # Checkout sources
      # ─────────────────────────────────────────────────────────────────────────
      - name: Checkout dayshield-rootfs
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.tag }}
          path: rootfs

      - name: Checkout dayshield-ui
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-ui
          ref: ${{ inputs.ui_ref || steps.tags.outputs.ui_tag }}
          path: dayshield-ui-src

      - name: Checkout dayshield-core
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-core
          ref: ${{ inputs.core_ref || steps.tags.outputs.core_tag }}
          path: dayshield-core-src

      # ─────────────────────────────────────────────────────────────────────────
      # Build UI
      # ─────────────────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dayshield-ui-src/package-lock.json

      - name: Build dayshield-ui dist
        working-directory: dayshield-ui-src
        run: |
          npm ci --no-audit --no-fund
          npm run build

      # ─────────────────────────────────────────────────────────────────────────
      # Build core
      # ─────────────────────────────────────────────────────────────────────────
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.88.0"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            dayshield-core-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('dayshield-core-src/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build dayshield-core binary
        working-directory: dayshield-core-src
        run: cargo build --release -p dayshield-core

      - name: Copy binary to rootfs workspace
        run: cp dayshield-core-src/target/release/dayshield-core rootfs/dayshield-core

      # ─────────────────────────────────────────────────────────────────────────
      # Build rootfs
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install rootfs build dependencies
        run: |
          curl -fsSL \
            -o /tmp/debian-archive-keyring_2025.1_all.deb \
            https://ftp.debian.org/debian/pool/main/d/debian-archive-keyring/debian-archive-keyring_2025.1_all.deb
          sudo dpkg -i /tmp/debian-archive-keyring_2025.1_all.deb
          rm -f /tmp/debian-archive-keyring_2025.1_all.deb

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mmdebstrap zstd debian-archive-keyring

      - name: Build rootfs
        working-directory: rootfs
        run: |
          ENABLE_SUITE_UPDATES=0
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.enable_suite_updates }}" = "true" ]; then
            ENABLE_SUITE_UPDATES=1
          fi

          sudo make rootfs \
            OUTPUT="${{ steps.version.outputs.artifact }}" \
            ENABLE_SUITE_UPDATES="${ENABLE_SUITE_UPDATES}" \
            UI_DIR="${GITHUB_WORKSPACE}/dayshield-ui-src/dist" \
            CORE_REPO_DIR="${GITHUB_WORKSPACE}/dayshield-core-src" \
            UI_REPO_DIR="${GITHUB_WORKSPACE}/dayshield-ui-src" \
            ROOTFS_REPO_DIR="${GITHUB_WORKSPACE}/rootfs"

      # ─────────────────────────────────────────────────────────────────────────
      # Verify
      # ─────────────────────────────────────────────────────────────────────────
      - name: Verify rootfs artifact
        working-directory: rootfs
        run: |
          VERIFY_DIR="$(mktemp -d)"
          sudo tar -I zstd -C "${VERIFY_DIR}" -xf "${{ steps.version.outputs.artifact }}"

          FAIL=0

          echo "==> Checking /usr/local/sbin/dayshield-core"
          if sudo test -x "${VERIFY_DIR}/usr/local/sbin/dayshield-core"; then
            echo "  [PASS] dayshield-core is present and executable"
          else
            echo "  [FAIL] dayshield-core missing or not executable" >&2
            FAIL=1
          fi

          sudo rm -rf "${VERIFY_DIR}"

          if [ "${FAIL}" -ne 0 ]; then
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Checksum
      # ─────────────────────────────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        working-directory: rootfs
        run: |
          sha256sum "${{ steps.version.outputs.artifact }}" \
            > "${{ steps.version.outputs.artifact }}.sha256"

      # ─────────────────────────────────────────────────────────────────────────
      # Publish GitHub Release
      # ─────────────────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        working-directory: rootfs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARTIFACT="${{ steps.version.outputs.artifact }}"
          CORE_REF="${{ inputs.core_ref || steps.tags.outputs.core_tag }}"
          UI_REF="${{ inputs.ui_ref || steps.tags.outputs.ui_tag }}"

          NOTES=$(cat <<EOF
          ## DayShield RootFS ${TAG}

          Deterministic Debian-based root filesystem for the DayShield Firewall appliance.

          ### Artifacts
          - \`${ARTIFACT}\`
          - \`${ARTIFACT}.sha256\`

          ### Build inputs
          - **dayshield-core tag:** \`${CORE_REF}\`
          - **dayshield-ui tag:** \`${UI_REF}\`

          ### Independent versioning
          RootFS versioning is independent of core and UI.

          ### Integration
          Use this rootfs when building the ISO:
          \`\`\`sh
          make -C ../dayshield-iso iso ROOTFS=/path/to/${ARTIFACT}
          \`\`\`
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "rootfs ${TAG}" \
              --notes "${NOTES}"
            gh release upload "${TAG}" \
              "${ARTIFACT}" \
              "${ARTIFACT}.sha256" \
              --clobber
          else
            gh release create "${TAG}" \
              --title "rootfs ${TAG}" \
              --notes "${NOTES}" \
              "${ARTIFACT}" \
              "${ARTIFACT}.sha256"
          fi