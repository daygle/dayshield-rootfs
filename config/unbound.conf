# /etc/unbound/unbound.conf - DayShield DNS resolver configuration.
# IPv4 only. Acts as a local recursive resolver.

server:
    # Bind only to loopback IPv4
    interface: 127.0.0.1
    port: 53

    # IPv4 only
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Access control - only allow localhost
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0   refuse

    # DNSSEC validation
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Root hints
    root-hints: "/usr/share/dns/root.hints"

    # Hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    hide-identity: yes
    hide-version: yes

    # Cache tuning
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # Logging
    verbosity: 1
    log-queries: no

    # Performance
    num-threads: 2
    rrset-cache-size: 256m
    msg-cache-size: 128m

    # Prefetch frequently queried names
    prefetch: yes

    # Private addresses - never forward these to upstream
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 100.64.0.0/10

    # Refuse all reverse lookups for private ranges
    # 10.0.0.0/8 - single class-A zone
    local-zone: "10.in-addr.arpa." nodefault
    # 172.16.0.0/12 - 16 class-B zones (172.16 through 172.31)
    local-zone: "16.172.in-addr.arpa." nodefault
    local-zone: "17.172.in-addr.arpa." nodefault
    local-zone: "18.172.in-addr.arpa." nodefault
    local-zone: "19.172.in-addr.arpa." nodefault
    local-zone: "20.172.in-addr.arpa." nodefault
    local-zone: "21.172.in-addr.arpa." nodefault
    local-zone: "22.172.in-addr.arpa." nodefault
    local-zone: "23.172.in-addr.arpa." nodefault
    local-zone: "24.172.in-addr.arpa." nodefault
    local-zone: "25.172.in-addr.arpa." nodefault
    local-zone: "26.172.in-addr.arpa." nodefault
    local-zone: "27.172.in-addr.arpa." nodefault
    local-zone: "28.172.in-addr.arpa." nodefault
    local-zone: "29.172.in-addr.arpa." nodefault
    local-zone: "30.172.in-addr.arpa." nodefault
    local-zone: "31.172.in-addr.arpa." nodefault
    # 192.168.0.0/16 - single class-B zone (octets reversed)
    local-zone: "168.192.in-addr.arpa." nodefault

    # Minimal response (strip unnecessary records)
    minimal-responses: yes

