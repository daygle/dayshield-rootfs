# /etc/unbound/unbound.conf - DayShield DNS resolver configuration.
# IPv4-first, hardened recursive resolver for firewall/LAN use.

server:
    ###########################################################################
    # Network binding (IPv4 only)
    ###########################################################################
    # Bind on all IPv4 addresses; ACL and firewall rules enforce client scope.
    interface: 0.0.0.0
    port: 53
    pidfile: "/run/unbound/unbound.pid"

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    ###########################################################################
    # Access control
    ###########################################################################
    # Allow localhost and RFC1918/CGNAT clients.
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 100.64.0.0/10 allow
    # Refuse everything else explicitly
    access-control: 0.0.0.0/0 refuse

    ###########################################################################
    # DNSSEC
    ###########################################################################
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-below-nxdomain: yes

    # Explicitly pinned off for compatibility with known-bad environments.
    qname-minimisation: no
    aggressive-nsec: no

    ###########################################################################
    # Root hints (required for recursive mode)
    ###########################################################################
    root-hints: "/usr/share/dns/root.hints"

    ###########################################################################
    # Privacy & hardening
    ###########################################################################
    hide-identity: yes
    hide-version: yes
    use-caps-for-id: yes
    module-config: "validator iterator"
    minimal-responses: yes
    edns-buffer-size: 1232

    ###########################################################################
    # Cache tuning
    ###########################################################################
    cache-min-ttl: 300
    cache-max-ttl: 86400
    rrset-cache-size: 256m
    msg-cache-size: 128m

    ###########################################################################
    # Prefetching
    ###########################################################################
    prefetch: yes
    prefetch-key: yes

    ###########################################################################
    # Private address protection
    ###########################################################################
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 100.64.0.0/10

    ###########################################################################
    # Block reverse lookups for private ranges
    ###########################################################################
    # 10.0.0.0/8
    local-zone: "10.in-addr.arpa." nodefault

    # 172.16.0.0/12 (172.16–172.31)
    local-zone: "16.172.in-addr.arpa." nodefault
    local-zone: "17.172.in-addr.arpa." nodefault
    local-zone: "18.172.in-addr.arpa." nodefault
    local-zone: "19.172.in-addr.arpa." nodefault
    local-zone: "20.172.in-addr.arpa." nodefault
    local-zone: "21.172.in-addr.arpa." nodefault
    local-zone: "22.172.in-addr.arpa." nodefault
    local-zone: "23.172.in-addr.arpa." nodefault
    local-zone: "24.172.in-addr.arpa." nodefault
    local-zone: "25.172.in-addr.arpa." nodefault
    local-zone: "26.172.in-addr.arpa." nodefault
    local-zone: "27.172.in-addr.arpa." nodefault
    local-zone: "28.172.in-addr.arpa." nodefault
    local-zone: "29.172.in-addr.arpa." nodefault
    local-zone: "30.172.in-addr.arpa." nodefault
    local-zone: "31.172.in-addr.arpa." nodefault

    # 192.168.0.0/16
    local-zone: "168.192.in-addr.arpa." nodefault

    # Optional: CGNAT 100.64.0.0/10 reverse blocking
    # Uncomment if you want full parity with private-address rules
    # local-zone: "64.100.in-addr.arpa." nodefault
    # local-zone: "65.100.in-addr.arpa." nodefault
    # ...
    # local-zone: "127.100.in-addr.arpa." nodefault

    ###########################################################################
    # Logging
    ###########################################################################
    verbosity: 1
    log-queries: no

    ###########################################################################
    # Performance
    ###########################################################################
    num-threads: 2

    # Guard to defer to dayshield-core for dynamic management.
    # Lives under /var so DNS settings survive every rootfs A/B update.
    include: "/var/lib/dayshield/unbound/dayshield.conf"
