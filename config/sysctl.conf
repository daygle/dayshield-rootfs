# /etc/sysctl.d/99-dayshield.conf
# DayShield kernel hardening parameters.

# ── IPv6 ─────────────────────────────────────────────────────────────────────
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# ── Network hardening ─────────────────────────────────────────────────────────
# Ignore ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reverse-path filtering
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Reject ICMP redirects from known gateways as well
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Ignore ICMP broadcast messages
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log martian packets for spoofing/misroute visibility
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# TCP SYN cookies
net.ipv4.tcp_syncookies = 1

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# ── IP forwarding ─────────────────────────────────────────────────────────────
# Required for LAN → WAN packet forwarding (NAT/routing).
net.ipv4.ip_forward = 1

# ── Kernel hardening ──────────────────────────────────────────────────────────
# Restrict kernel pointer exposure
kernel.kptr_restrict = 2

# Restrict dmesg access
kernel.dmesg_restrict = 1

# Suppress kernel INFO/DEBUG messages from appearing on the tty console.
# Level 4 = WARNING and above only on console; kernel logs still go to journal.
# Format: console_loglevel default_message_loglevel min_console_loglevel default_console_loglevel
kernel.printk = 4 4 1 7

# Disable core dumps from setuid programs
fs.suid_dumpable = 0

# Harden filesystem link and special-file handling for unprivileged users
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# Reduce local privilege-escalation surface
kernel.unprivileged_bpf_disabled = 1
kernel.yama.ptrace_scope = 1

# Randomise address space
kernel.randomize_va_space = 2
