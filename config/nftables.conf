#!/usr/sbin/nft -f
# /etc/nftables.conf - DayShield base firewall ruleset.
# IPv4-first default ruleset. DayShield core generates IPv6 tables when enabled.

# Interface assignments - written by the console wizard.
# Safe placeholder (lo) used until the wizard assigns real interfaces.
include "/etc/dayshield/config/nft-ifaces.conf"

# Flush all existing rules
flush ruleset

# ── IPv4 filter table ─────────────────────────────────────────────────────────
table ip filter {

    # Allowed inbound TCP ports (all interfaces)
    set allowed_tcp_in {
        type inet_service
        flags interval
        elements = { 22, 443, 8443 }
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # Allow established / related traffic
        ct state established,related accept

        # Drop invalid conntrack state early
        ct state invalid drop

        # Allow loopback
        iifname "lo" accept

        # Allow ICMP echo (ping) - rate-limited
        ip protocol icmp icmp type echo-request limit rate 10/second accept

        # Allow allowed TCP inbound
        tcp dport @allowed_tcp_in ct state new accept

        # Allow DNS responses from 127.0.0.1 (unbound)
        ip saddr 127.0.0.1 udp sport 53 accept
        ip saddr 127.0.0.1 tcp sport 53 accept

        # Allow DHCP requests to local server on LAN
        iifname $LAN_IF udp dport 67 accept

        # Allow DNS queries to local resolver on LAN
        iifname $LAN_IF udp dport 53 accept
        iifname $LAN_IF tcp dport 53 accept

        # Log and drop everything else
        limit rate 5/second burst 20 packets log prefix "DEFAULT-BLOCK INPUT "
        drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Allow established / related return traffic
        ct state established,related accept

        # Drop invalid conntrack state early
        ct state invalid drop

        # Allow LAN → WAN forwarding
        iifname $LAN_IF oifname $WAN_IF accept

        # Log and drop everything else
        limit rate 5/second burst 20 packets log prefix "DEFAULT-BLOCK FORWARD "
        drop
    }

    chain output {
        type filter hook output priority 0; policy accept;

        # Drop invalid conntrack state early
        ct state invalid drop
    }
}

# ── IPv4 NAT table ────────────────────────────────────────────────────────────
table ip nat {

    chain prerouting {
        type nat hook prerouting priority -100;
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # Masquerade LAN traffic leaving via WAN
        oifname $WAN_IF masquerade
    }
}

include "/etc/nftables.d/*.nft"
